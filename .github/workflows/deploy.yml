name: Deploy to Server

# 安全说明：
# - 只监听 main 分支的 push 和手动触发
# - 不监听 pull_request 事件，避免外部 PR 触发 self-hosted runner
# - 推荐配合 GitHub 分支保护规则使用

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Deploy
        run: |
          cd <YOUR_PROJECT_PATH>
          git pull origin main
          pnpm install --frozen-lockfile
          pnpm run build
          sudo systemctl reload nginx
