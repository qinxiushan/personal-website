name: Deploy to Server

# 安全说明：
# - 只监听 main 分支的 push 和手动触发
# - 不监听 pull_request 事件，避免外部 PR 触发 self-hosted runner
# - 推荐配合 GitHub 分支保护规则使用

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: |
          pnpm install --frozen-lockfile
          pnpm run build

      - name: Deploy
        run: |
          sudo rm -rf /home/ubuntu/project/chengjiabiao/dist
          sudo cp -r dist /home/ubuntu/project/chengjiabiao/
          sudo systemctl reload nginx
